<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lambda Picks — Editorial Signal</title>
<style>
:root {
  --bg:radial-gradient(circle at top left,#1b2232 0,#0c0e12 55%),linear-gradient(180deg,#0b0b0d,#15171d);
  --panel:rgba(18,19,24,.92);
  --line:rgba(255,255,255,.07);
  --text:#f5f2ee;
  --muted:#a59d95;
  --soft:#e3dad2;
  --field-bg:#14151a;
  --field-line:rgba(255,255,255,.07);
  --accent-bg:#f0e8df;
  --accent-text:#16110d;
  --button-secondary:#28221d;
  --button-ghost:#b3a89f;
  --danger:#ffd1cb;
  --preview-bg:linear-gradient(180deg,#111216,#0d0e12);
  --preview-panel:rgba(255,255,255,.022);
  --preview-line:rgba(255,255,255,.07);
  --badge-bg:#f1e9e0;
  --badge-text:#17120f;
  --brand-fill:#f2ebe3;
  --brand-text:#17120f;
  --brand-border:rgba(255,255,255,.18);
  --title-size:56px;
  --hero-brand-size:16px;
}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:Inter,Segoe UI,Arial,sans-serif;color:var(--text);background:var(--bg);min-height:100vh}
body.preview-mode{background:transparent}
.shell{width:min(1240px,calc(100vw - 28px));margin:24px auto 40px;display:grid;grid-template-columns:410px minmax(0,1fr);gap:20px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:30px;box-shadow:0 24px 64px rgba(0,0,0,.24);backdrop-filter:blur(9px)}
.side{position:sticky;top:18px;align-self:start;overflow:hidden}
.section{padding:24px}
.hero{padding-bottom:18px;border-bottom:1px solid var(--line);display:grid;gap:18px}
.brand-row{display:flex;justify-content:flex-start}
.brand-mark{display:inline-flex;align-items:center;justify-content:center;padding:10px 16px;border-radius:999px;border:1px solid var(--brand-border);background:var(--brand-fill);color:var(--brand-text);font-size:var(--hero-brand-size);font-weight:900;letter-spacing:.08em;text-transform:uppercase;box-shadow:inset 0 1px 0 rgba(255,255,255,.15)}
.hero-copy{margin:0;color:var(--muted);font-size:14px;line-height:1.75;max-width:34ch}
.form-shell{display:grid;gap:18px}
.form-block{display:grid;gap:14px;padding:18px;border-radius:24px;background:rgba(255,255,255,.018);border:1px solid var(--line)}
.block-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding-bottom:12px;border-bottom:1px solid var(--line)}
.block-title{font-size:13px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--soft)}
.field-stack{display:grid;gap:12px}
.field-card{padding:14px 14px 13px;border-radius:18px;background:var(--field-bg);border:1px solid var(--field-line);display:grid;gap:10px}
.field-card label{font-size:13px;font-weight:700;color:var(--soft)}
.field-card input[type="text"], .field-card textarea, .field-card select{width:100%;border:none;background:transparent;color:var(--text);font-size:15px;outline:none;padding:0;font-family:inherit}
.field-card textarea{min-height:96px;resize:vertical;line-height:1.65}
.field-card input::placeholder,.field-card textarea::placeholder{color:transparent}
.select-wrap{position:relative}
.select-wrap::after{content:'⌄';position:absolute;right:2px;top:50%;transform:translateY(-54%);color:var(--soft);pointer-events:none;font-size:18px;line-height:1}
.field-card select{appearance:none;-webkit-appearance:none;-moz-appearance:none;padding-right:24px;background-color:var(--field-bg);color-scheme:dark}
.field-card select option{background:#0f141b;color:#f2f6fb}
.thumb-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.file-btn{position:relative;display:inline-flex;align-items:center;justify-content:center;padding:12px 14px;min-height:44px;border-radius:14px;border:1px dashed var(--field-line);background:rgba(255,255,255,.01);cursor:pointer;color:var(--soft);font-weight:700}
.file-btn input{position:absolute;inset:0;opacity:0;cursor:pointer}
.thumb-preview{width:72px;height:72px;border-radius:16px;display:none;object-fit:cover;border:1px solid var(--field-line)}
.thumb-name,.status,.section-sub,.count{color:var(--muted)}
.actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.btn{appearance:none;border:none;border-radius:16px;padding:13px 16px;font-size:14px;font-weight:800;cursor:pointer;transition:transform .12s ease,opacity .18s ease;font-family:inherit}
.btn:hover{transform:translateY(-1px)}
.primary{background:var(--accent-bg);color:var(--accent-text)}
.secondary{background:var(--button-secondary);color:var(--text);border:1px solid var(--line)}
.ghost{background:transparent;color:var(--button-ghost);border:1px solid var(--line)}
.stack{display:grid;gap:20px}
.section-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:18px}
.section-title{font-size:20px;font-weight:800;letter-spacing:-.02em}
.draft-list,.share-items{display:grid;gap:14px}
.draft-item,.share-item{display:grid;grid-template-columns:32px 84px 1fr auto;gap:16px;align-items:start;padding:16px;border-radius:24px;background:rgba(255,255,255,.02);border:1px solid var(--line)}
.share-item{grid-template-columns:108px 1fr}
.drag-handle{align-self:stretch;display:flex;align-items:center;justify-content:center;border-radius:16px;border:1px dashed rgba(255,255,255,.1);background:rgba(255,255,255,.015);color:var(--muted);font-size:16px;font-weight:800;cursor:grab;user-select:none;touch-action:none;min-height:84px}
.drag-handle:active{cursor:grabbing}
.draft-item.dragging{opacity:.45;border-color:rgba(255,255,255,.2)}
.draft-item.drop-target{border-color:rgba(255,255,255,.32);background:rgba(255,255,255,.05)}
.share-item{grid-template-columns:108px 1fr}
.draft-cover,.share-cover{width:84px;height:84px;border-radius:18px;object-fit:cover;background:rgba(255,255,255,.02);border:1px solid var(--field-line)}
.share-cover{width:108px;height:108px;border-radius:22px}
.share-cover-wrap{display:flex;align-items:flex-start}
.draft-noimg,.share-noimg{display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;text-align:center;padding:8px}
.draft-meta,.share-meta{min-width:0;display:grid;gap:12px}
.meta-head{display:grid;gap:10px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.06)}
.badge{display:inline-flex;align-items:center;align-self:start;width:max-content;padding:6px 10px;border-radius:999px;background:var(--badge-bg);color:var(--badge-text);font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}
.draft-title,.share-name{margin:0;font-size:22px;line-height:1.15;letter-spacing:-.025em;word-break:break-word}
.share-name{font-size:34px}
.draft-reason,.share-reason{margin:0;color:#cad3df;line-height:1.65;font-size:14px;word-break:break-word}
.share-reason{font-size:15px}
.remove-btn{appearance:none;border:none;background:transparent;color:var(--danger);border:1px solid rgba(255,180,180,.24);border-radius:14px;padding:10px 12px;font-weight:700;cursor:pointer}
.share-board{position:relative;display:grid;gap:16px;padding:22px;border-radius:28px;background:var(--preview-bg);border:1px solid var(--line);overflow:hidden}
.board-brand{position:absolute;top:20px;right:20px;display:inline-flex;align-items:center;justify-content:center;padding:8px 13px;border-radius:999px;border:1px solid var(--brand-border);background:var(--brand-fill);color:var(--brand-text);font-size:11px;font-weight:900;letter-spacing:.1em;text-transform:uppercase}
.board-header{display:grid;gap:12px;padding:10px 6px 18px;border-bottom:1px solid var(--preview-line)}
.board-title{margin:0;max-width:min(82%,900px);font-size:var(--title-size);line-height:1.02;letter-spacing:-.046em;color:#f5f7fb}
.board-sub{margin:0;color:var(--muted);font-size:15px;line-height:1.6}
.board-foot{text-align:right;color:var(--muted);font-size:13px}
.empty-state{padding:18px;border-radius:18px;background:rgba(255,255,255,.02);border:1px dashed var(--line);color:var(--muted);text-align:center}
.empty-state.large{padding:48px 18px}
@media (max-width: 980px){
  .shell{grid-template-columns:1fr}
  .side{position:static}
  .actions{grid-template-columns:1fr}
  .draft-item{grid-template-columns:28px 72px 1fr}
  .share-item{grid-template-columns:72px 1fr}
  .remove-btn{grid-column:3/4;justify-self:start}
  .drag-handle{min-height:72px}
  .board-title{max-width:100%;font-size:40px}
  .board-brand{position:static;justify-self:start}
}
body.preview-mode .shell{grid-template-columns:1fr;max-width:1100px;width:min(1100px,calc(100vw - 20px));margin:10px auto}
body.preview-mode .side, body.preview-mode .queue-panel, body.preview-mode .preview-panel .section-head{display:none}
body.preview-mode .preview-panel>.section{padding:0;border:0}
body.preview-mode .preview-panel{background:transparent;border:none;box-shadow:none}
body.preview-mode .share-board{min-height:660px}

body{font-feature-settings:"ss01" 1}
.brand-mark,.board-brand{border-radius:14px;padding:8px 12px;letter-spacing:.04em}
.board-title,.draft-title,.share-name{font-family:Georgia,"Times New Roman",serif;font-weight:700;letter-spacing:-.04em}
.hero-copy,.draft-reason,.share-reason,.board-sub{font-family:Georgia,"Times New Roman",serif}
.badge{border-radius:12px}

</style>
</head>
<body>
<div class="shell">
  <aside class="panel side">
    <div class="section hero">
      <div class="brand-row"><div class="brand-mark">Lambda Picks</div></div>
      <p class="hero-copy">Create a clean recommendation image for music, films, series, games, anime, and anything else worth sharing.</p>
    </div>
    <div class="section form-shell">
      <section class="form-block">
        <div class="block-head"><div class="block-title">Collection</div></div>
        <div class="field-stack">
          <div class="field-card">
            <label for="listTitle">Collection title</label>
            <input id="listTitle" type="text" />
          </div>
        </div>
      </section>
      <section class="form-block">
        <div class="block-head"><div class="block-title">Item details</div></div>
        <div class="field-stack">
          <div class="field-card">
            <label for="itemCategory">Category</label>
            <div class="select-wrap">
              <select id="itemCategory">
                <option value="music">Music</option>
                <option value="film">Film</option>
                <option value="series">Series</option>
                <option value="game">Game</option>
                <option value="anime">Anime</option>
                <option value="other">Other</option>
              </select>
            </div>
          </div>
          <div class="field-card">
            <label for="itemName">Item title</label>
            <input id="itemName" type="text" />
          </div>
          <div class="field-card">
            <label for="itemReason">Why recommend it</label>
            <textarea id="itemReason"></textarea>
          </div>
          <div class="field-card">
            <label>Thumbnail</label>
            <div class="thumb-row">
              <label class="file-btn">
                <span>Choose image</span>
                <input id="thumbInput" type="file" accept="image/*" />
              </label>
              <img id="thumbPreview" class="thumb-preview" alt="thumbnail preview" />
            </div>
            <div id="thumbName" class="thumb-name">No image selected</div>
          </div>
        </div>
      </section>
      <div class="actions">
        <button class="btn primary" id="addBtn">Add item</button>
        <button class="btn secondary" id="shareBtn">Export image</button>
        <button class="btn ghost" id="clearBtn">Clear all</button>
      </div>
      <div id="status" class="status">Ready.</div>
    </div>
  </aside>

  <main class="stack">
    <section class="panel section queue-panel">
      <div class="section-head">
        <div>
          <div class="section-title">Queue</div>
          <div class="section-sub">Drag items to reorder</div>
        </div>
        <div id="count" class="count">0 items</div>
      </div>
      <div id="draftList" class="draft-list"></div>
    </section>

    <section class="panel preview-panel">
      <div class="section">
        <div class="section-head">
          <div>
            <div class="section-title">Share preview</div>
            <div class="section-sub">Preview updates automatically</div>
          </div>
        </div>
        <div id="shareBoard" class="share-board"></div>
      </div>
    </section>
  </main>
</div>

<script>
const THEME = {
  storageSuffix: "editorial_signal",
  export_bg_top: "#111217",
  export_bg_bottom: "#17181e",
  export_panel_fill: "rgba(255,255,255,.022)",
  export_panel_stroke: "rgba(255,255,255,.07)",
  export_card_fill: "rgba(255,255,255,.025)",
  export_card_stroke: "rgba(255,255,255,.07)",
  export_heading: "#f6f1ea",
  export_body: "#d7cdc3",
  export_muted: "#ab9f93",
  export_empty: "#1a1714",
  export_badge_bg: "#f1e8dc",
  export_badge_text: "#17120f",
  export_brand_bg: "#f2ebe3",
  export_brand_text: "#17120f",
  export_brand_line: "rgba(255,255,255,.18)"
};
const STORAGE_KEY = '__lambda_picks_refresh__' + THEME.storageSuffix;
const DEMO_MODE = new URLSearchParams(location.search).get('demo') === '1';
const PREVIEW_MODE = new URLSearchParams(location.search).get('preview') === '1';
if (PREVIEW_MODE) document.body.classList.add('preview-mode');
const SAMPLE_DATA = {"title": "Shaw's picks", "items": [{"category": "film", "name": "Blade Runner 2049", "reason": "Dense atmosphere, surgical pacing, and a world that keeps expanding after the credits.", "thumb": "https://picsum.photos/seed/bladerunner/600/600"}, {"category": "game", "name": "Half-Life 2", "reason": "Still absurdly sharp in rhythm, level flow, and visual storytelling.", "thumb": "https://picsum.photos/seed/halflife/600/600"}]};

let items = [];
let currentThumb = '';

const listTitleEl = document.getElementById('listTitle');
const itemCategoryEl = document.getElementById('itemCategory');
const itemNameEl = document.getElementById('itemName');
const itemReasonEl = document.getElementById('itemReason');
const thumbInputEl = document.getElementById('thumbInput');
const thumbPreviewEl = document.getElementById('thumbPreview');
const thumbNameEl = document.getElementById('thumbName');
const addBtn = document.getElementById('addBtn');
const shareBtn = document.getElementById('shareBtn');
const clearBtn = document.getElementById('clearBtn');
const countEl = document.getElementById('count');
const draftListEl = document.getElementById('draftList');
const shareBoardEl = document.getElementById('shareBoard');
const statusEl = document.getElementById('status');

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}
function setStatus(text) { statusEl.textContent = text; }
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function categoryLabel(value) {
  return ({music:'Music',film:'Film',series:'Series',game:'Game',anime:'Anime',other:'Other'})[value] || 'Other';
}
function save() {
  if (DEMO_MODE) return;
  localStorage.setItem(STORAGE_KEY, JSON.stringify({listTitle:listTitleEl.value.trim(), items}));
}
function load() {
  if (DEMO_MODE) {
    items = structuredClone(SAMPLE_DATA.items).map((item, index) => ({id:'demo-' + index, ...item}));
    listTitleEl.value = SAMPLE_DATA.title;
    return;
  }
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data && Array.isArray(data.items)) items = data.items;
    if (data && typeof data.listTitle === 'string') listTitleEl.value = data.listTitle;
  } catch (e) {}
}
function resetThumbInput() {
  currentThumb = '';
  thumbInputEl.value = '';
  thumbPreviewEl.style.display = 'none';
  thumbPreviewEl.src = '';
  thumbNameEl.textContent = 'No image selected';
}
function moveItem(fromIndex, toIndex) {
  if (fromIndex === toIndex || fromIndex < 0 || toIndex < 0 || fromIndex >= items.length || toIndex >= items.length) return;
  const updated = [...items];
  const [moved] = updated.splice(fromIndex, 1);
  updated.splice(toIndex, 0, moved);
  items = updated;
}

function attachDragSorting() {
  let draggedId = null;
  const cards = [...draftListEl.querySelectorAll('.draft-item[data-id]')];
  cards.forEach(card => {
    const handle = card.querySelector('.drag-handle');
    if (!handle) return;
    handle.addEventListener('dragstart', (e) => {
      draggedId = card.dataset.id;
      card.classList.add('dragging');
      if (e.dataTransfer) {
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', draggedId);
      }
    });
    handle.addEventListener('dragend', () => {
      draggedId = null;
      draftListEl.querySelectorAll('.draft-item').forEach(el => el.classList.remove('dragging', 'drop-target'));
    });
  });

  cards.forEach(card => {
    card.addEventListener('dragover', (e) => {
      e.preventDefault();
      if (!draggedId || draggedId === card.dataset.id) return;
      draftListEl.querySelectorAll('.draft-item').forEach(el => el.classList.remove('drop-target'));
      card.classList.add('drop-target');
      if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
    });
    card.addEventListener('dragleave', () => {
      card.classList.remove('drop-target');
    });
    card.addEventListener('drop', (e) => {
      e.preventDefault();
      const sourceId = draggedId || (e.dataTransfer ? e.dataTransfer.getData('text/plain') : '');
      const targetId = card.dataset.id;
      card.classList.remove('drop-target');
      if (!sourceId || sourceId === targetId) return;
      const fromIndex = items.findIndex(item => item.id === sourceId);
      const toIndex = items.findIndex(item => item.id === targetId);
      moveItem(fromIndex, toIndex);
      save();
      renderDraftList();
      renderShareBoard();
      setStatus('Order updated.');
    });
  });
}

function renderDraftList() {
  countEl.textContent = `${items.length} ${items.length === 1 ? 'item' : 'items'}`;
  if (!items.length) {
    draftListEl.innerHTML = `<div class="empty-state">No items yet.</div>`;
    return;
  }
  draftListEl.innerHTML = items.map(item => `
    <article class="draft-item" data-id="${item.id}">
      <div class="drag-handle" draggable="true" aria-label="Drag to reorder" title="Drag to reorder">⋮⋮</div>
      ${item.thumb ? `<img class="draft-cover" src="${item.thumb}" alt="cover" />` : `<div class="draft-cover draft-noimg">No image</div>`}
      <div class="draft-meta">
        <div class="meta-head">
          <span class="badge">${escapeHtml(categoryLabel(item.category))}</span>
          <h3 class="draft-title">${escapeHtml(item.name)}</h3>
        </div>
        <p class="draft-reason">${escapeHtml(item.reason)}</p>
      </div>
      <button class="remove-btn" data-id="${item.id}">Delete</button>
    </article>
  `).join('');
  draftListEl.querySelectorAll('.remove-btn[data-id]').forEach(btn => {
    btn.addEventListener('click', () => {
      items = items.filter(item => item.id !== btn.dataset.id);
      save();
      renderDraftList();
      renderShareBoard();
      setStatus('Item removed.');
    });
  });
  attachDragSorting();
  attachTouchSorting();
}
function renderShareBoard() {
  const title = listTitleEl.value.trim() || 'Untitled collection';
  const countText = `${items.length} ${items.length === 1 ? 'item' : 'items'} · ready to share`;
  if (!items.length) {
    shareBoardEl.innerHTML = `
      <div class="board-brand">Lambda Picks</div>
      <div class="board-header">
        <h2 class="board-title">${escapeHtml(title)}</h2>
        <p class="board-sub">Add items and your share image will update here automatically.</p>
      </div>
      <div class="empty-state large">Your share image preview will appear here.</div>
      <div class="board-foot">Made with Lambda Picks</div>
    `;
    return;
  }
  shareBoardEl.innerHTML = `
    <div class="board-brand">Lambda Picks</div>
    <div class="board-header">
      <h2 class="board-title">${escapeHtml(title)}</h2>
      <p class="board-sub">${countText}</p>
    </div>
    <section class="share-items">
      ${items.map(item => `
        <article class="share-item">
          <div class="share-cover-wrap">
          ${item.thumb ? `<img class="share-cover" src="${item.thumb}" alt="cover" />` : `<div class="share-cover share-noimg">No image</div>`}
          </div>
          <div class="share-meta">
            <div class="meta-head">
              <span class="badge">${escapeHtml(categoryLabel(item.category))}</span>
              <h3 class="share-name">${escapeHtml(item.name)}</h3>
            </div>
            <p class="share-reason">${escapeHtml(item.reason)}</p>
          </div>
        </article>
      `).join('')}
    </section>
    <div class="board-foot">Made with Lambda Picks</div>
  `;
  save();
}
function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
thumbInputEl.addEventListener('change', async (e) => {
  const file = e.target.files?.[0];
  if (!file) { resetThumbInput(); return; }
  try {
    currentThumb = await readFileAsDataURL(file);
    thumbPreviewEl.src = currentThumb;
    thumbPreviewEl.style.display = 'block';
    thumbNameEl.textContent = file.name;
  } catch (err) {
    setStatus('Image read failed. Try another file.');
    resetThumbInput();
  }
});
addBtn.addEventListener('click', () => {
  const category = itemCategoryEl.value;
  const name = itemNameEl.value.trim();
  const reason = itemReasonEl.value.trim();
  if (!name) return setStatus('Enter a title first.');
  if (!reason) return setStatus('Add a short reason.');
  items.push({id:uid(), category, name, reason, thumb: currentThumb || ''});
  itemNameEl.value = '';
  itemReasonEl.value = '';
  itemCategoryEl.value = 'music';
  resetThumbInput();
  save();
  renderDraftList();
  renderShareBoard();
  setStatus('Item added.');
});
clearBtn.addEventListener('click', () => {
  items = [];
  save();
  renderDraftList();
  renderShareBoard();
  setStatus('All items cleared.');
});
listTitleEl.addEventListener('input', () => { save(); renderShareBoard(); });

function loadImage(src) {
  return new Promise(resolve => {
    if (!src) return resolve(null);
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = src;
  });
}
function roundRect(ctx, x, y, w, h, r) {
  const rr = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + rr, y);
  ctx.arcTo(x + w, y, x + w, y + h, rr);
  ctx.arcTo(x + w, y + h, x, y + h, rr);
  ctx.arcTo(x, y + h, x, y, rr);
  ctx.arcTo(x, y, x + w, y, rr);
  ctx.closePath();
}
function wrapText(ctx, text, maxWidth) {
  const lines = [];
  for (const raw of String(text).split(/\n/)) {
    const words = raw.split(/\s+/).filter(Boolean);
    if (!words.length) { lines.push(' '); continue; }
    let current = words[0];
    for (let i = 1; i < words.length; i++) {
      const test = current + ' ' + words[i];
      if (ctx.measureText(test).width > maxWidth && current) {
        lines.push(current);
        current = words[i];
      } else {
        current = test;
      }
    }
    lines.push(current);
  }
  return lines;
}
function drawBrand(g, width, padding) {
  const label = 'Lambda Picks';
  g.font = '900 18px Inter, Arial, sans-serif';
  const padX = 14;
  const w = g.measureText(label).width + padX * 2;
  const h = 34;
  const x = width - padding - w;
  const y = padding + 22;
  roundRect(g, x, y, w, h, 17);
  g.fillStyle = THEME.export_brand_bg;
  g.strokeStyle = THEME.export_brand_line;
  g.lineWidth = 1;
  g.fill();
  g.stroke();
  g.fillStyle = THEME.export_brand_text;
  g.fillText(label, x + padX, y + 23);
}
function drawCanvasCategory(g, text, x, y) {
  g.font = '900 14px Inter, Arial, sans-serif';
  const padX = 12;
  const h = 28;
  const display = text.toUpperCase();
  const w = g.measureText(display).width + padX * 2;
  roundRect(g, x, y, w, h, 14);
  g.fillStyle = THEME.export_badge_bg;
  g.fill();
  g.fillStyle = THEME.export_badge_text;
  g.fillText(display, x + padX, y + 19);
  return { w, h };
}
async function drawShareCanvas() {
  const title = listTitleEl.value.trim() || 'Untitled collection';
  const width = 1080;
  const padding = 42;
  const coverSize = 128;
  const gap = 20;
  const innerPad = 18;
  const cardWidth = width - padding * 2;
  const textWidth = cardWidth - innerPad * 2 - coverSize - 24;
  const tempCanvas = document.createElement('canvas');
  const ctx = tempCanvas.getContext('2d');
  ctx.font = '700 48px Inter, Arial, sans-serif';
  const titleLines = wrapText(ctx, title, cardWidth - 44);
  const titleHeight = titleLines.length * 58;
  const imageCache = await Promise.all(items.map(item => loadImage(item.thumb)));
  const layouts = [];
  let y = padding + 150 + titleHeight;
  items.forEach((item, i) => {
    ctx.font = '700 34px Inter, Arial, sans-serif';
    const nameLines = wrapText(ctx, item.name, textWidth);
    ctx.font = '400 24px Inter, Arial, sans-serif';
    const reasonLines = wrapText(ctx, item.reason, textWidth);
    const textHeight = 104 + nameLines.length * 42 + 20 + reasonLines.length * 34;
    const cardHeight = Math.max(coverSize, textHeight) + innerPad * 2;
    layouts.push({item, image:imageCache[i], y, cardHeight, nameLines, reasonLines});
    y += cardHeight + gap;
  });
  const height = y + 62;
  tempCanvas.width = width;
  tempCanvas.height = height;
  const g = tempCanvas.getContext('2d');
  const bg = g.createLinearGradient(0,0,0,height);
  bg.addColorStop(0, THEME.export_bg_top);
  bg.addColorStop(1, THEME.export_bg_bottom);
  g.fillStyle = bg;
  g.fillRect(0,0,width,height);
  roundRect(g, padding, padding, cardWidth, height - padding * 2, 32);
  g.fillStyle = THEME.export_panel_fill;
  g.strokeStyle = THEME.export_panel_stroke;
  g.lineWidth = 1;
  g.fill();
  g.stroke();
  drawBrand(g, width, padding);
  g.fillStyle = THEME.export_heading;
  g.font = '700 48px Inter, Arial, sans-serif';
  let titleY = padding + 92;
  titleLines.forEach(line => {
    g.fillText(line, padding + 28, titleY);
    titleY += 58;
  });
  g.strokeStyle = THEME.export_panel_stroke;
  g.lineWidth = 1;
  g.beginPath();
  g.moveTo(padding + 28, titleY + 8);
  g.lineTo(width - padding - 28, titleY + 8);
  g.stroke();
  layouts.forEach(layout => {
    const cardX = padding + 18;
    const cardY = layout.y;
    const cardW = cardWidth - 36;
    roundRect(g, cardX, cardY, cardW, layout.cardHeight, 24);
    g.fillStyle = THEME.export_card_fill;
    g.strokeStyle = THEME.export_card_stroke;
    g.fill();
    g.stroke();
    const coverX = cardX + innerPad;
    const coverY = cardY + innerPad;
    roundRect(g, coverX, coverY, coverSize, coverSize, 18);
    g.save();
    g.clip();
    if (layout.image) {
      g.drawImage(layout.image, coverX, coverY, coverSize, coverSize);
    } else {
      g.fillStyle = THEME.export_empty;
      g.fillRect(coverX, coverY, coverSize, coverSize);
      g.fillStyle = THEME.export_muted;
      g.font = '600 16px Inter, Arial, sans-serif';
      const noText = 'No image';
      const noW = g.measureText(noText).width;
      g.fillText(noText, coverX + (coverSize - noW)/2, coverY + coverSize/2 + 6);
    }
    g.restore();
    const textX = coverX + coverSize + 22;
    const badgeY = coverY + 8;
    const badge = drawCanvasCategory(g, categoryLabel(layout.item.category), textX, badgeY);
    let textY = badgeY + badge.h + 42;
    g.fillStyle = THEME.export_heading;
    g.font = '700 34px Inter, Arial, sans-serif';
    layout.nameLines.forEach(line => {
      g.fillText(line, textX, textY);
      textY += 42;
    });
    textY += 10;
    g.fillStyle = THEME.export_body;
    g.font = '400 24px Inter, Arial, sans-serif';
    layout.reasonLines.forEach(line => {
      g.fillText(line, textX, textY);
      textY += 34;
    });
  });
  g.fillStyle = THEME.export_muted;
  g.font = '500 20px Inter, Arial, sans-serif';
  const foot = 'Made with Lambda Picks';
  const footW = g.measureText(foot).width;
  g.fillText(foot, width - padding - footW, height - padding - 16);
  return tempCanvas;
}

function attachTouchSorting() {
  const handles = [...draftListEl.querySelectorAll('.drag-handle')];
  let activeId = null;
  let activeCard = null;
  let lastSwapId = null;

  handles.forEach(handle => {
    handle.addEventListener('pointerdown', (e) => {
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      activeCard = handle.closest('.draft-item');
      if (!activeCard) return;
      activeId = activeCard.dataset.id;
      lastSwapId = null;
      activeCard.classList.add('dragging');
      handle.setPointerCapture?.(e.pointerId);
      e.preventDefault();
    });

    handle.addEventListener('pointermove', (e) => {
      if (!activeId || !activeCard) return;
      const el = document.elementFromPoint(e.clientX, e.clientY);
      const targetCard = el?.closest?.('.draft-item');
      if (!targetCard || targetCard.dataset.id === activeId || targetCard.dataset.id === lastSwapId) return;
      const fromIndex = items.findIndex(item => item.id === activeId);
      const toIndex = items.findIndex(item => item.id === targetCard.dataset.id);
      if (fromIndex === -1 || toIndex === -1) return;
      moveItem(fromIndex, toIndex);
      lastSwapId = targetCard.dataset.id;
      renderDraftList();
      renderShareBoard();
      activeCard = draftListEl.querySelector(`.draft-item[data-id="${activeId}"]`);
      activeCard?.classList.add('dragging');
    });

    const finish = () => {
      if (!activeId) return;
      save();
      renderDraftList();
      renderShareBoard();
      setStatus('Order updated.');
      activeId = null;
      activeCard = null;
      lastSwapId = null;
    };

    handle.addEventListener('pointerup', finish);
    handle.addEventListener('pointercancel', finish);
  });
}

shareBtn.addEventListener('click', async () => {
  if (!items.length) return setStatus('Add at least one item first.');
  setStatus('Exporting image...');
  const canvas = await drawShareCanvas();
  canvas.toBlob(async (blob) => {
    if (!blob) return setStatus('Export failed.');
    const file = new File([blob], 'lambda-picks.png', {type:'image/png'});
    if (navigator.canShare && navigator.canShare({files:[file]})) {
      try {
        await navigator.share({files:[file], title:'Lambda Picks'});
        setStatus('Shared.');
        return;
      } catch (e) {}
    }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'lambda-picks.png';
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 500);
    setStatus('PNG downloaded.');
  }, 'image/png');
});

}
if (location.hash === '#demo') {
