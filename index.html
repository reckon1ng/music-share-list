    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Lambda Picks — Mono</title>
      <style>

:root{
  --bg:#080808;--panel:#0f0f10;--line:rgba(255,255,255,.08);--text:#f2f2f2;--muted:#9a9a9a;--soft:#d8d8d8;
  --primary:#ffffff;--primary-text:#0c0c0d;--radius:20px;--shadow:none
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;color:var(--text);background:#080808;min-height:100vh}
.shell{width:min(1160px,calc(100vw - 28px));margin:18px auto 28px;display:grid;grid-template-columns:360px minmax(0,1fr);gap:16px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:22px}
.side{position:sticky;top:12px;align-self:start;overflow:hidden}
.section{padding:20px}
.hero{padding-bottom:16px;border-bottom:1px solid var(--line)}
.eyebrow{display:inline-flex;padding:6px 10px;border:1px solid var(--line);border-radius:999px;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
h1{margin:14px 0 8px;font-size:30px;line-height:1;letter-spacing:-.04em}
.hero-copy,.section-sub,.status,.thumb-name,.count{color:var(--muted)}
.hero-copy{margin:0;font-size:13px;line-height:1.65}
.form-grid{display:grid;gap:14px}
.field label{display:block;margin-bottom:9px;font-size:12px;font-weight:800;letter-spacing:.08em;color:var(--muted);text-transform:uppercase}
input[type="text"],textarea,select{
  width:100%;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:#121314;color:var(--text);
  padding:13px 14px;font-size:14px;outline:none;transition:.18s ease
}
textarea{min-height:112px;resize:vertical;line-height:1.6}
input[type="text"]:focus,textarea:focus,select:focus{border-color:#626262;box-shadow:0 0 0 3px rgba(255,255,255,.04)}
.thumb-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.file-btn{position:relative;display:inline-flex;align-items:center;justify-content:center;padding:11px 13px;min-height:44px;border-radius:14px;border:1px dashed #505050;background:#121314;cursor:pointer}
.file-btn input{position:absolute;inset:0;opacity:0;cursor:pointer}
.thumb-preview{width:70px;height:70px;border-radius:14px;display:none;object-fit:cover;border:1px solid var(--line)}
.thumb-name{font-size:12px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{appearance:none;border:none;border-radius:14px;padding:12px 14px;font-size:13px;font-weight:800;cursor:pointer;transition:transform .12s ease}
.btn:hover{transform:translateY(-1px)}
.primary{background:var(--primary);color:var(--primary-text)}
.secondary{background:#161718;color:var(--text);border:1px solid var(--line)}
.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
.stack{display:grid;gap:16px}
.section-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:16px}
.section-title{font-size:18px;font-weight:800;letter-spacing:-.02em}
.draft-list,.share-items{display:grid;gap:12px}
.draft-item,.share-item{display:grid;grid-template-columns:72px 1fr auto;gap:12px;align-items:start;padding:12px;border-radius:18px;background:#121314;border:1px solid var(--line)}
.share-item{grid-template-columns:88px 1fr}
.draft-cover,.share-cover{width:72px;height:72px;border-radius:14px;object-fit:cover;background:#161718;border:1px solid var(--line)}
.share-cover{width:88px;height:88px;border-radius:16px}
.draft-noimg,.share-noimg{display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;text-align:center;padding:8px}
.badge{display:inline-flex;padding:5px 9px;border-radius:999px;background:#fff;color:#0d0d0d;font-size:10px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}
.draft-title,.share-name{margin:9px 0 6px;font-size:18px;line-height:1.15;letter-spacing:-.03em}
.share-name{font-size:23px}
.draft-reason,.share-reason{margin:0;color:#c4c4c4;line-height:1.6;font-size:13px}
.share-reason{font-size:14px}
.remove-btn{appearance:none;border:none;background:transparent;color:#d3d3d3;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:9px 10px;font-weight:700;cursor:pointer}
.share-board{display:grid;gap:14px}
.board-header{padding:8px 2px 4px}
.board-chip{display:inline-flex;padding:7px 11px;border-radius:999px;background:#fff;color:#0d0d0d;font-size:10px;font-weight:900;letter-spacing:.12em;text-transform:uppercase}
.board-title{margin:14px 0 8px;font-size:34px;line-height:1;letter-spacing:-.05em}
.board-sub{margin:0;color:var(--muted);font-size:14px;line-height:1.55}
.board-foot{text-align:right;color:var(--muted);font-size:12px}
.empty-state{padding:18px;border-radius:16px;background:#121314;border:1px dashed var(--line);color:var(--muted);text-align:center}
.empty-state.large{padding:42px 18px}
@media (max-width: 960px){.shell{grid-template-columns:1fr}.side{position:static}.actions{grid-template-columns:1fr}.draft-item,.share-item{grid-template-columns:72px 1fr}.remove-btn{grid-column:2 / 3;justify-self:start}}

      </style>
    </head>
    <body>
      <div class="shell">
        <aside class="panel side">
          <div class="section hero">
            <div class="eyebrow">Minimal mode</div>
            <h1>Lambda Picks</h1>
            <p class="hero-copy">Ultra-clean monochrome. Best if you want something closer to a quiet product UI.</p>
          </div>

          <div class="section form-grid">
            <div class="field">
              <label for="listTitle">Collection title</label>
              <input id="listTitle" type="text" placeholder="Weekend essentials" />
            </div>

            <div class="field">
              <label for="itemCategory">Category</label>
              <select id="itemCategory">
                <option value="music">Music</option>
                <option value="film">Film</option>
                <option value="series">Series</option>
                <option value="game">Game</option>
                <option value="anime">Anime</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div class="field">
              <label for="itemName">Item title</label>
              <input id="itemName" type="text" placeholder="NieR: Automata" />
            </div>

            <div class="field">
              <label for="itemReason">Why recommend it</label>
              <textarea id="itemReason" placeholder="Short, precise, worth sharing."></textarea>
            </div>

            <div class="field">
              <label>Thumbnail (optional)</label>
              <div class="thumb-row">
                <label class="file-btn">
                  <span>Choose image</span>
                  <input id="thumbInput" type="file" accept="image/*" />
                </label>
                <img id="thumbPreview" class="thumb-preview" alt="thumbnail preview" />
              </div>
              <div id="thumbName" class="thumb-name">No image selected</div>
            </div>

            <div class="actions">
              <button class="btn primary" id="addBtn">Add item</button>
              <button class="btn secondary" id="buildBtn">Build preview</button>
              <button class="btn secondary" id="shareBtn">Export image</button>
              <button class="btn ghost" id="clearBtn">Clear all</button>
            </div>

            <div id="status" class="status">Ready.</div>
          </div>
        </aside>

        <main class="stack">
          <section class="panel section">
            <div class="section-head">
              <div>
                <div class="section-title">Queue</div>
                <div class="section-sub">Draft items before export</div>
              </div>
              <div id="count" class="count">0 items</div>
            </div>
            <div id="draftList" class="draft-list"></div>
          </section>

          <section class="panel section preview-shell">
            <div class="section-head">
              <div>
                <div class="section-title">Share preview</div>
                <div class="section-sub">This is the layout that will be rendered into the final image</div>
              </div>
            </div>
            <div id="shareBoard" class="share-board"></div>
          </section>
        </main>
      </div>

      <script>

const canvasPanelFill = 'rgba(255,255,255,0.02)';
const canvasPanelStroke = 'rgba(255,255,255,0.10)';
const canvasCardFill = 'rgba(255,255,255,0.03)';
const canvasCardStroke = 'rgba(255,255,255,0.10)';
const canvasHeadingText = '#f4f4f4';
const canvasBodyText = '#d1d1d1';
const canvasMutedText = '#9f9f9f';
const canvasImageEmptyFill = '#161718';
const canvasCardRadius = 20;
const canvasFootText = 'Made with Lambda Picks';


        function drawCanvasTheme(g, width, height) {

g.fillStyle = '#080808';
g.fillRect(0, 0, width, height);

        }

        function drawCanvasHeader(g, title, titleLines, padding, cardWidth, count) {

roundRect(g, padding + 26, padding + 26, 194, 42, 21);
g.fillStyle = '#ffffff';
g.fill();
g.fillStyle = '#0b0b0c';
g.font = '800 18px Inter, Arial, sans-serif';
g.fillText('LAMBDA PICKS', padding + 44, padding + 53);

g.fillStyle = '#f4f4f4';
g.font = '700 46px Inter, Arial, sans-serif';
let titleY = padding + 118;
titleLines.forEach(line => {
  g.fillText(line, padding + 28, titleY);
  titleY += 58;
});

g.fillStyle = '#9a9a9a';
g.font = '400 24px Inter, Arial, sans-serif';
g.fillText(`${count} ${count === 1 ? 'item' : 'items'} · export image`, padding + 28, titleY + 12);

        }

        function drawCanvasCategory(g, text, x, y) {

const padX = 12;
const h = 28;
g.font = '800 14px Inter, Arial, sans-serif';
const w = g.measureText(text).width + padX * 2;
roundRect(g, x, y, w, h, 14);
g.fillStyle = '#ffffff';
g.fill();
g.fillStyle = '#0b0b0c';
g.fillText(text.toUpperCase(), x + padX, y + 19);

        }


    const STORAGE_KEY = '__lambda_picks_local_v2__';
    let items = [];
    let currentThumb = '';

    const listTitleEl = document.getElementById('listTitle');
    const itemCategoryEl = document.getElementById('itemCategory');
    const itemNameEl = document.getElementById('itemName');
    const itemReasonEl = document.getElementById('itemReason');
    const thumbInputEl = document.getElementById('thumbInput');
    const thumbPreviewEl = document.getElementById('thumbPreview');
    const thumbNameEl = document.getElementById('thumbName');
    const addBtn = document.getElementById('addBtn');
    const buildBtn = document.getElementById('buildBtn');
    const shareBtn = document.getElementById('shareBtn');
    const clearBtn = document.getElementById('clearBtn');
    const countEl = document.getElementById('count');
    const draftListEl = document.getElementById('draftList');
    const shareBoardEl = document.getElementById('shareBoard');
    const statusEl = document.getElementById('status');

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function categoryLabel(value) {
      const labels = {
        music: 'Music',
        film: 'Film',
        series: 'Series',
        game: 'Game',
        anime: 'Anime',
        other: 'Other'
      };
      return labels[value] || 'Other';
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        listTitle: listTitleEl.value.trim(),
        items
      }));
    }

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);
        if (data && Array.isArray(data.items)) items = data.items;
        if (data && typeof data.listTitle === 'string') listTitleEl.value = data.listTitle;
      } catch (e) {}
    }

    function resetThumbInput() {
      currentThumb = '';
      thumbInputEl.value = '';
      thumbPreviewEl.style.display = 'none';
      thumbPreviewEl.src = '';
      thumbNameEl.textContent = 'No image selected';
    }

    function renderDraftList() {
      countEl.textContent = `${items.length} ${items.length === 1 ? 'item' : 'items'}`;
      if (!items.length) {
        draftListEl.innerHTML = `<div class="empty-state">No items yet.</div>`;
        return;
      }

      draftListEl.innerHTML = items.map(item => `
        <article class="draft-item">
          ${item.thumb ? `<img class="draft-cover" src="${item.thumb}" alt="cover" />` : `<div class="draft-cover draft-noimg">No image</div>`}
          <div class="draft-meta">
            <div class="draft-badges"><span class="badge">${escapeHtml(categoryLabel(item.category))}</span></div>
            <h3 class="draft-title">${escapeHtml(item.name)}</h3>
            <p class="draft-reason">${escapeHtml(item.reason)}</p>
          </div>
          <button class="remove-btn" data-id="${item.id}">Delete</button>
        </article>
      `).join('');

      draftListEl.querySelectorAll('[data-id]').forEach(btn => {
        btn.addEventListener('click', () => {
          items = items.filter(item => item.id !== btn.dataset.id);
          save();
          renderDraftList();
          renderShareBoard();
          setStatus('Item removed.');
        });
      });
    }

    function renderShareBoard() {
      const title = listTitleEl.value.trim() || 'Current Picks';
      if (!items.length) {
        shareBoardEl.innerHTML = `
          <div class="board-header">
            <span class="board-chip">LAMBDA PICKS</span>
            <h2 class="board-title">${escapeHtml(title)}</h2>
            <p class="board-sub">Build a clean share image for music, films, series, games and more.</p>
          </div>
          <div class="empty-state large">Your share image preview will appear here.</div>
        `;
        return;
      }

      shareBoardEl.innerHTML = `
        <div class="board-header">
          <span class="board-chip">LAMBDA PICKS</span>
          <h2 class="board-title">${escapeHtml(title)}</h2>
          <p class="board-sub">${items.length} ${items.length === 1 ? 'item' : 'items'} · ready to export</p>
        </div>
        <section class="share-items">
          ${items.map(item => `
            <article class="share-item">
              ${item.thumb ? `<img class="share-cover" src="${item.thumb}" alt="cover" />` : `<div class="share-cover share-noimg">No image</div>`}
              <div class="share-meta">
                <span class="badge">${escapeHtml(categoryLabel(item.category))}</span>
                <h3 class="share-name">${escapeHtml(item.name)}</h3>
                <p class="share-reason">${escapeHtml(item.reason)}</p>
              </div>
            </article>
          `).join('')}
        </section>
        <div class="board-foot">Generated locally from Lambda Picks</div>
      `;
      save();
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    thumbInputEl.addEventListener('change', async (e) => {
      const file = e.target.files?.[0];
      if (!file) {
        resetThumbInput();
        return;
      }
      try {
        currentThumb = await readFileAsDataURL(file);
        thumbPreviewEl.src = currentThumb;
        thumbPreviewEl.style.display = 'block';
        thumbNameEl.textContent = file.name;
      } catch (err) {
        setStatus('Image read failed. Try another file.');
        resetThumbInput();
      }
    });

    addBtn.addEventListener('click', () => {
      const category = itemCategoryEl.value;
      const name = itemNameEl.value.trim();
      const reason = itemReasonEl.value.trim();
      if (!name) return setStatus('Enter a title first.');
      if (!reason) return setStatus('Add a short reason.');

      items.push({
        id: uid(),
        category,
        name,
        reason,
        thumb: currentThumb || ''
      });

      itemNameEl.value = '';
      itemReasonEl.value = '';
      itemCategoryEl.value = 'music';
      resetThumbInput();
      save();
      renderDraftList();
      renderShareBoard();
      setStatus('Item added.');
    });

    buildBtn.addEventListener('click', () => {
      renderShareBoard();
      setStatus('Preview updated.');
    });

    clearBtn.addEventListener('click', () => {
      items = [];
      save();
      renderDraftList();
      renderShareBoard();
      setStatus('All items cleared.');
    });

    listTitleEl.addEventListener('input', save);

    function loadImage(src) {
      return new Promise((resolve) => {
        if (!src) return resolve(null);
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = src;
      });
    }

    function roundRect(ctx, x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.arcTo(x + w, y, x + w, y + h, rr);
      ctx.arcTo(x + w, y + h, x, y + h, rr);
      ctx.arcTo(x, y + h, x, y, rr);
      ctx.arcTo(x, y, x + w, y, rr);
      ctx.closePath();
    }

    function wrapText(ctx, text, maxWidth) {
      const rawLines = String(text).split(/\n/);
      const lines = [];
      for (const raw of rawLines) {
        const chars = [...raw];
        let current = '';
        for (const ch of chars) {
          const test = current + ch;
          if (ctx.measureText(test).width > maxWidth && current) {
            lines.push(current);
            current = ch;
          } else {
            current = test;
          }
        }
        lines.push(current || ' ');
      }
      return lines;
    }

    async function drawShareCanvas() {
      const title = listTitleEl.value.trim() || 'Current Picks';
      const width = 1080;
      const padding = 42;
      const coverSize = 128;
      const gap = 18;
      const innerPad = 18;
      const cardWidth = width - padding * 2;
      const textWidth = cardWidth - innerPad * 2 - coverSize - 20;

      const tempCanvas = document.createElement('canvas');
      const ctx = tempCanvas.getContext('2d');
      ctx.font = '700 46px Inter, Arial, sans-serif';
      const titleLines = wrapText(ctx, title, cardWidth - 16);
      const titleHeight = titleLines.length * 58;

      const imageCache = await Promise.all(items.map(item => loadImage(item.thumb)));
      const layouts = [];
      let y = padding + 172 + titleHeight;

      items.forEach((item, i) => {
        ctx.font = '700 34px Inter, Arial, sans-serif';
        const nameLines = wrapText(ctx, item.name, textWidth);
        ctx.font = '400 24px Inter, Arial, sans-serif';
        const reasonLines = wrapText(ctx, item.reason, textWidth);
        const textHeight = 32 + nameLines.length * 42 + 12 + reasonLines.length * 34;
        const cardHeight = Math.max(coverSize, textHeight) + innerPad * 2;
        layouts.push({
          item,
          image: imageCache[i],
          y,
          cardHeight,
          nameLines,
          reasonLines
        });
        y += cardHeight + gap;
      });

      const height = y + 62;
      tempCanvas.width = width;
      tempCanvas.height = height;

      const g = tempCanvas.getContext('2d');
      drawCanvasTheme(g, width, height);

      roundRect(g, padding, padding, cardWidth, height - padding * 2, 32);
      g.fillStyle = canvasPanelFill;
      g.strokeStyle = canvasPanelStroke;
      g.lineWidth = 1;
      g.fill();
      g.stroke();

      drawCanvasHeader(g, title, titleLines, padding, cardWidth, items.length);

      layouts.forEach(layout => {
        const cardX = padding + 18;
        const cardY = layout.y;
        const cardW = cardWidth - 36;
        roundRect(g, cardX, cardY, cardW, layout.cardHeight, canvasCardRadius);
        g.fillStyle = canvasCardFill;
        g.strokeStyle = canvasCardStroke;
        g.lineWidth = 1;
        g.fill();
        g.stroke();

        const coverX = cardX + innerPad;
        const coverY = cardY + innerPad;
        roundRect(g, coverX, coverY, coverSize, coverSize, 18);
        g.save();
        g.clip();
        if (layout.image) {
          g.drawImage(layout.image, coverX, coverY, coverSize, coverSize);
        } else {
          g.fillStyle = canvasImageEmptyFill;
          g.fillRect(coverX, coverY, coverSize, coverSize);
          g.fillStyle = canvasMutedText;
          g.font = '600 16px Inter, Arial, sans-serif';
          const label = 'No image';
          const w = g.measureText(label).width;
          g.fillText(label, coverX + (coverSize - w) / 2, coverY + coverSize / 2 + 6);
        }
        g.restore();

        const textX = coverX + coverSize + 20;
        let textY = coverY + 24;
        drawCanvasCategory(g, categoryLabel(layout.item.category), textX, textY - 10);
        textY += 28;

        g.fillStyle = canvasHeadingText;
        g.font = '700 34px Inter, Arial, sans-serif';
        layout.nameLines.forEach(line => {
          g.fillText(line, textX, textY + 12);
          textY += 42;
        });

        textY += 8;
        g.fillStyle = canvasBodyText;
        g.font = '400 24px Inter, Arial, sans-serif';
        layout.reasonLines.forEach(line => {
          g.fillText(line, textX, textY + 8);
          textY += 34;
        });
      });

      g.fillStyle = canvasMutedText;
      g.font = '400 18px Inter, Arial, sans-serif';
      const foot = canvasFootText;
      const footWidth = g.measureText(foot).width;
      g.fillText(foot, width - padding - footWidth, height - 28);

      return tempCanvas;
    }

    async function shareList() {
      if (!items.length) return setStatus('Add at least one item first.');

      renderShareBoard();
      setStatus('Generating image...');
      try {
        const canvas = await drawShareCanvas();
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        if (!blob) throw new Error('PNG generation failed');

        const title = (listTitleEl.value.trim() || 'lambda-picks').replace(/[\\/:*?"<>|]+/g, '-');
        const file = new File([blob], `${title}.png`, { type: 'image/png' });

        const canNativeShare = navigator.canShare && navigator.canShare({ files: [file] });
        if (canNativeShare && navigator.share) {
          await navigator.share({ files: [file], title, text: title });
          setStatus('System share opened.');
          return;
        }

        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${title}.png`;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 2000);
        setStatus('PNG downloaded.');
      } catch (err) {
        console.error(err);
        setStatus('Share failed. Try again.');
      }
    }

    shareBtn.addEventListener('click', shareList);

    load();
    renderDraftList();
    renderShareBoard();

      </script>
    </body>
    </html>
